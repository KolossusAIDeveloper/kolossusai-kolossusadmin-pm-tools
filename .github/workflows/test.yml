name: Tests
on: [push]
jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test -- --runInBand || node tests/app.test.js
      - run: cd client && npm install && npm run build
